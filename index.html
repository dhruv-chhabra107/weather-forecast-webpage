<!DOCTYPE html>
<html>
<head>
<title>Weather App</title>

<style>
body {
  margin:0;
  font-family:'Segoe UI';
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg,#5f9cff,#a18cd1);
}

.card {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
  padding:25px;
  border-radius:15px;
  width:320px;
  text-align:center;
  color:white;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

input {
  width:80%;
  padding:10px;
  border:none;
  border-radius:8px;
  outline:none;
}

button {
  margin-top:10px;
  padding:10px 20px;
  border:none;
  border-radius:8px;
  background:white;
  color:#333;
  cursor:pointer;
  font-weight:bold;
}

.temp {
  font-size:40px;
  margin:10px 0;
}

.desc {
  font-size:18px;
}

.extra {
  font-size:14px;
  opacity:0.9;
}

img {
  width:80px;
}
</style>

</head>
<body>

<div class="card">

<h2>🌦️ Weather</h2>

<input id="city" placeholder="Enter city (Delhi, London)">
<br>
<button onclick="getWeather()">Search</button>

<div class="temp" id="temp"></div>
<div class="desc" id="desc"></div>
<div class="extra" id="feels"></div>
<div class="extra" id="time"></div>
<img id="icon">

</div>

<script>

const API = "4e65eddd0b384ba29a8101615262404";

function getWeather(){

 let city = document.getElementById("city").value;

 fetch(`https://api.weatherapi.com/v1/current.json?key=${API}&q=${city}`)
 .then(res => res.json())
 .then(data => {

  if(data.error){
    document.getElementById("temp").innerText = "❌ City not found";
    document.getElementById("desc").innerText = "";
    document.getElementById("feels").innerText = "";
    document.getElementById("icon").src = "";
    document.getElementById("time").innerText = "";
  } else {

    document.getElementById("temp").innerText = data.current.temp_c + "°C";
    document.getElementById("desc").innerText = data.current.condition.text;
    document.getElementById("feels").innerText = "Feels like: " + data.current.feelslike_c + "°C";

    document.getElementById("icon").src = data.current.condition.icon;

    document.getElementById("time").innerText =
    "Local time: " + data.location.localtime;

  }

 });

}

</script>

</body>
</html>
